$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command

experiment_name: finetune-openpi-echelon
display_name: Finetune OpenPI Echelon
description: Finetune OpenVLA on Echelon

# compute: azureml:nc6v3
# compute: azureml:msrresrchbasicvc

# See private docs for setting compute to a resource URI:
# https://dev.azure.com/msresearch/GCR/_wiki/wikis/GCR%20Wiki/14263/Job-Submission-using-AML-SDKv2-(and-bring-your-own-workspace)?anchor=default-vc-info
# compute: /subscriptions/22da88f6-1210-4de2-a5a3-da4c7c2a1213/resourceGroups/gcr-singularity/providers/Microsoft.MachineLearningServices/virtualclusters/msrresrchbasicvc
compute: /subscriptions/22da88f6-1210-4de2-a5a3-da4c7c2a1213/resourceGroups/gcr-singularity-resrch/providers/Microsoft.MachineLearningServices/virtualclusters/msrresrchvc

distribution:
  type: pytorch
  process_count_per_instance: 1

resources:
  instance_count: 1
  # Determine available instance types by running `amlt cache instance-types -I A100``
  # instance_type: Singularity.NC24ad_A100_v4
  instance_type: Singularity.NC48ad_A100_v4
  properties:

    AISuperComputer:
      slaTier: Premium
      enableAzmlInt: false
      priority: high

    amlt:
      job:
        sku: G2-A100

    # Possible alternative to setting objects
    # amlt.job.sku: G2-A100
    # azureml.SLATier: Premium

environment:
  # image: mcr.microsoft.com/azureml/openmpi4.1.0-cuda11.6-cudnn8-ubuntu20.04:latest
  image: mcr.microsoft.com/azureml/inference-base-cuda12.4-ubuntu22.04

code: ../

environment_variables:
  XLA_PYTHON_CLIENT_MEM_FRACTION: "0.9"
  JOB_EXECUTION_MODE: "basic"
  AZUREML_COMPUTE_USE_COMMON_RUNTIME: 'true'
  _AZUREML_SINGULARITY_JOB_UAI: /subscriptions/2cd190bb-b42a-477c-b1bb-2f20932d8dc5/resourceGroups/Reuben-Tan/providers/Microsoft.ManagedIdentity/userAssignedIdentities/reubenuai

# https://learn.microsoft.com/en-us/azure/machine-learning/reference-yaml-job-command?view=azureml-api-2#managedidentityconfiguration:~:text=output%20specification.-,identity,-object
identity:
  type: managed

# https://learn.microsoft.com/en-us/azure/machine-learning/reference-yaml-job-command?view=azureml-api-2#job-inputs
inputs:
  benchmark_data:
    type: uri_folder
    # path_on_compute: file:/mnt/data/benchmark_data
    # path: https://yuwanechelon.blob.core.windows.net/data/atupini/erlds/benchamrk_01_post_quaternion_fix__20250404_original
    path: azureml://datastores/yuwanechelon/paths/data/atupini/erlds/benchamrk_01_post_quaternion_fix__20250404_original

# Undocumented feature to mount inputs to known paths
# https://teams.microsoft.com/l/message/19:mj2a1444FgLJUI_I7LdFt0qmy63jq_XnO7B9uVDCeOY1@thread.tacv2/1694620096879?tenantId=72f988bf-86f1-41af-91ab-2d7cd011db47&groupId=4fe31e05-a921-48ef-b85f-228071c4ce3b&parentMessageId=1680718113104&teamName=Ask%20AzureML%2BSingularity&channelName=General&createdTime=1694620096879
properties:
  AZURE_ML_INPUT_PathOnCompute_benchmark_data: /mnt/data/benchmark_data

command: |-
  echo "Job Start"
  echo "========================="

  echo ""
  echo "Install dependencies"
  echo "========================="
  sudo apt-get -y install git git-lfs tree

  echo ""
  echo "Container Setup" 
  echo "========================="
  curl -LsSf https://astral.sh/uv/install.sh | sh
  source /home/aiscuser/.local/bin/env
  # source $HOME/.local/bin/env
  uv

  echo ""
  echo "uv sync"
  echo "========================="
  GIT_LFS_SKIP_SMUDGE=1 uv sync

  echo ""
  echo "activate virtual env"
  echo "========================="
  source .venv/bin/activate

  echo ""
  echo "uv pip install -e ."
  echo "========================="
  GIT_LFS_SKIP_SMUDGE=1 uv pip install -e .

  echo ""
  echo "Install to WANDB nd HF"
  echo "========================="
  pip install wandb
  pip install -U "huggingface_hub[cli]"

  echo ""
  echo "Authenticate to WANDB nd HF"
  echo "========================="
  export WANDB_PROJECT=$WANDB_PROJECT
  export WANDB_API_KEY=$WANDB_API_KEY
  wandb login --host=$WANDB_BASE_URL

  export HF_TOKEN=$HF_TOKEN
  huggingface-cli login --token $HF_TOKEN

  echo ""
  echo "Verify CUDA and Drivers"
  echo "========================="
  nvidia-smi

  echo ""
  echo "Verify ERLDS dataset path"
  echo "========================="
  tree -d -L 2 /mnt/data

  echo ""
  echo "Install tensorflow_datasets for TFDS conversion to HFDS"
  echo "========================="
  uv pip install tensorflow_datasets

  echo ""
  echo "Convert ERLDS dataset to Lerobot format"
  echo "========================="
  uv run ./scripts/convert_erlds_data_to_lerobot.py
      --data-dir /mnt/data/mattm/datasets/20250425_main_rightarm_cameras
      --dataset-name echelon_original
      --data_class original
      --state_type ja
      --cameras main_and_right_wrist
      --org_or_user microsoft
      --prefix echelon

  echo ""
  echo "Compute Norm Stats"
  echo "========================="
  export CUDA_VISIBLE_DEVICES=0
  uv run ./scripts/compute_norm_stats.py
      --config-name pi0_echelon_original_ja_main_arm_cam_train
  unset CUDA_VISIBLE_DEVICES

  echo ""
  echo "Train"
  echo "========================="
  export XLA_PYTHON_CLIENT_MEM_FRACTION=0.9
  uv run ./scripts/train.py
      pi0_echelon_original_ja_main_arm_cam_train
      --exp-name
      "echelon_original-ja-main_and_right_wrist"
      --overwrite
    
  echo "End"


